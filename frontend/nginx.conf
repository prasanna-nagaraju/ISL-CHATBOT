server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend (optional if VITE_API_URL set)
    # location /api/ {
    #     proxy_pass http://backend:8000/;
    # }
}

